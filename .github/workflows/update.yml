name: Update Groundwater Data

on:

  workflow_dispatch:

  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - env:
          DIVER_USERNAME: ${{ secrets.DIVER_USERNAME }}
          DIVER_PASSWORD: ${{ secrets.DIVER_PASSWORD }}
        run: python update_groundwater.py

      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add groundwater.json

          git diff --cached --quiet || git commit -m "Update groundwater data"

          git push
